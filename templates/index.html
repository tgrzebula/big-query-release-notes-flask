<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Subtle Background Elements -->
    <div class="mesh-gradient"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="app-container">
        <!-- Sidebar / Header Area -->
        <header class="app-header">
            <div class="brand-container">
                <div class="brand">
                    <div class="brand-logo">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#logoGrad1)" />
                            <path d="M2 17L12 22L22 17M2 12L17L22 12" stroke="url(#logoGrad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="logoGrad1" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#3b82f6"/>
                                    <stop offset="1" stop-color="#8b5cf6"/>
                                </linearGradient>
                                <linearGradient id="logoGrad2" x1="2" y1="12" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#60a5fa"/>
                                    <stop offset="1" stop-color="#a78bfa"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="brand-details">
                        <h1>BigQuery</h1>
                        <span class="subtitle">Release Hub</span>
                    </div>
                </div>

                <!-- Theme Toggle -->
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark/light mode">
                    <span class="toggle-track">
                        <span class="toggle-thumb">
                            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                        </span>
                    </span>
                    <span class="theme-text">Dark Mode</span>
                </button>
            </div>

            <!-- Feed Status Summary -->
            <div class="feed-status-card">
                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span class="status-text">Connected to Feed</span>
                </div>
                <div class="status-meta">
                    <p>Fetched: <span id="sync-time">Loading...</span></p>
                    <p>Feed Updated: <span id="feed-updated">Loading...</span></p>
                </div>
                <button id="btn-refresh" class="btn btn-secondary btn-icon" title="Refresh release notes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon icon-refresh">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>

            <!-- Dashboard Stats -->
            <div class="stats-grid">
                <div class="stat-card" data-filter-type="Feature">
                    <div class="stat-icon feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-features">-</span>
                        <span class="stat-label">Features</span>
                    </div>
                </div>
                <div class="stat-card" data-filter-type="Announcement">
                    <div class="stat-icon announcement-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-announcements">-</span>
                        <span class="stat-label">Announcements</span>
                    </div>
                </div>
                <div class="stat-card" data-filter-type="Change">
                    <div class="stat-icon change-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 3h5v5M4 20L20 4M20 16v5h-5M4 4l16 16" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-changes">-</span>
                        <span class="stat-label">Changes</span>
                    </div>
                </div>
                <div class="stat-card" data-filter-type="Breaking">
                    <div class="stat-icon breaking-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-breaking">-</span>
                        <span class="stat-label">Breaking</span>
                    </div>
                </div>
            </div>

        </header>

        <!-- Main Content Area -->
        <main class="app-main">
            <!-- Search and Filter Bar -->
            <section class="controls-panel">
                <div class="search-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search release notes... (Press '/' to focus)" aria-label="Search release notes">
                    <span class="search-shortcut">/</span>
                    <button id="btn-clear-search" class="clear-search-btn" title="Clear search" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="filters-row">
                    <div class="type-filters" id="type-filter-group">
                        <button class="filter-chip active" data-filter="all">All Updates</button>
                        <button class="filter-chip" data-filter="Feature">
                            <span class="chip-color feature"></span>Features
                        </button>
                        <button class="filter-chip" data-filter="Announcement">
                            <span class="chip-color announcement"></span>Announcements
                        </button>
                        <button class="filter-chip" data-filter="Change">
                            <span class="chip-color change"></span>Changes
                        </button>
                        <button class="filter-chip" data-filter="Breaking">
                            <span class="chip-color breaking"></span>Breaking
                        </button>
                        <button class="filter-chip" data-filter="Issue">
                            <span class="chip-color issue"></span>Issues
                        </button>
                    </div>

                    <div class="extra-filters">
                        <button id="btn-export-csv" class="btn btn-secondary btn-icon" title="Export current release notes to CSV">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon icon-export">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                            </svg>
                            <span>Export CSV</span>
                        </button>
                        <button id="btn-bookmarked" class="btn btn-secondary btn-icon" title="Show saved/bookmarked releases">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon icon-bookmark">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span>Saved (<span id="bookmark-count">0</span>)</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Active Filters Summary -->
            <div id="filter-summary" class="filter-summary-bar" style="display: none;">
                <span class="summary-text">Showing filtered results</span>
                <button id="btn-reset-filters" class="btn-link">Reset all filters</button>
            </div>

            <!-- Timeline/Release Feed -->
            <section class="feed-section">
                <!-- Skeleton Loading State -->
                <div id="skeleton-loader" class="skeleton-container">
                    <div class="skeleton-card">
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line desc"></div>
                        <div class="skeleton-line long"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line desc"></div>
                        <div class="skeleton-line long"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line desc"></div>
                    </div>
                </div>

                <!-- Actual Timeline Container -->
                <div id="timeline-container" class="timeline-container" style="display: none;">
                    <!-- Dynamically populated entries go here -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state" style="display: none;">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            <line x1="8" y1="11" x2="14" y2="11"></line>
                        </svg>
                    </div>
                    <h3>No release notes match your criteria</h3>
                    <p>Try adjusting your search terms, filters, or view all bookmarks.</p>
                    <button id="btn-clear-all" class="btn btn-primary">Clear all filters</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Scroll to Top with Scroll Progress -->
    <button id="scroll-to-top" class="scroll-to-top-btn" aria-label="Scroll to top" title="Scroll to top">
        <svg class="progress-ring" width="40" height="40">
            <circle class="progress-ring__circle" stroke="currentColor" stroke-width="3" fill="transparent" r="18" cx="20" cy="20"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="arrow-icon">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
